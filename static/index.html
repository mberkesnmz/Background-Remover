<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BG Remover</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <h1>Background Remover</h1>
    <p class="subtitle">Upload an image and remove the background instantly</p>

    <!-- Drop zone (hidden after file selected) -->
    <div class="drop-zone" id="dropZone">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p>Drag & drop your image here</p>
      <span>or</span>
      <button class="btn-upload" id="chooseBtn" type="button">Choose File</button>
      <input type="file" id="fileInput" accept="image/*" hidden/>
    </div>

    <!-- Selected file bar (shown after file selected) -->
    <div class="file-bar" id="fileBar" hidden>
      <span class="file-name" id="fileName"></span>
      <button class="btn-reset" id="resetBtn" title="Remove and pick another image">✕ Reset</button>
    </div>

    <div class="options">
      <label for="bgColor">Background color (optional):</label>
      <div class="color-row">
        <input type="color" id="bgColor" value="#ffffff"/>
        <button id="clearColor" class="btn-clear" type="button">✕ Transparent</button>
      </div>
    </div>

    <button class="btn-remove" id="removeBtn" disabled type="button">Remove Background</button>

    <!-- Loader -->
    <div class="loader" id="loader" hidden>
      <div class="spinner"></div>
      <p>Processing…</p>
    </div>

    <!-- Preview: original only (shown after file selected) -->
    <div class="preview-single" id="previewOriginal" hidden>
      <p class="preview-label">Original</p>
      <img id="originalImg" alt="original"/>
    </div>

    <!-- Preview: both panels (shown after processing) -->
    <div class="preview" id="previewResult" hidden>
      <div class="preview-box">
        <p>Original</p>
        <img id="originalImg2" alt="original"/>
      </div>
      <div class="preview-box">
        <p>Result</p>
        <div class="checker">
          <img id="resultImg" alt="result"/>
        </div>
        <a id="downloadBtn" class="btn-download" download="result.png">Download</a>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
